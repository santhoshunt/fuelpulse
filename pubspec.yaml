name: fuelpulse
description: "FuelPulse — Offline fuel fill-up tracker with km/L efficiency and brand comparison."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  csv: ^6.0.0
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  flutter_colorpicker: ^1.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.29.0

flutter:
  uses-material-design: true
